<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYPER SCROLL // BRUTAL MODE</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&family=Syncopate:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #030303;
            --card-bg: rgba(10, 10, 10, 0.4);
            --text: #e0e0e0;
            --accent: #ff003c;
            --accent-2: #00f3ff;
            --border: rgba(255, 255, 255, 0.1);
            --font-display: 'Syncopate', sans-serif;
            --font-code: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            background: var(--bg);
            cursor: crosshair;
        }

        /* Body must be taller than viewport so the page is scrollable */
        body {
            width: 100%;
            height: 10000px;
            /* tall enough for scroll distance */
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-display);
            overflow-x: hidden;
        }

        /* ── OVERLAYS (fixed, always on top) ── */
        .scanlines {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(to bottom,
                    transparent 0px,
                    transparent 2px,
                    rgba(0, 0, 0, 0.15) 2px,
                    rgba(0, 0, 0, 0.15) 4px);
            pointer-events: none;
            z-index: 30;
        }

        .vignette {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at center, transparent 50%, #000 130%);
            pointer-events: none;
            z-index: 31;
        }

        /* ── HUD ── */
        .hud {
            position: fixed;
            inset: 2rem;
            z-index: 40;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            font-family: var(--font-code);
            font-size: 10px;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .hud-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .hud strong {
            color: var(--accent-2);
        }

        .hud-line {
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
            margin: 0 1rem;
            position: relative;
        }

        .hud-line::after {
            content: '';
            position: absolute;
            right: -1px;
            top: -2px;
            width: 5px;
            height: 5px;
            background: var(--accent);
        }

        .hud-side {
            align-self: flex-start;
            margin: auto 0;
            writing-mode: vertical-rl;
            transform: rotate(180deg);
        }

        .back-btn {
            position: fixed;
            top: 2rem;
            right: 2rem;
            z-index: 50;
            pointer-events: all;
            color: var(--accent);
            font-family: var(--font-code);
            font-size: 11px;
            text-decoration: none;
            border: 1px solid var(--accent);
            padding: 8px 16px;
            letter-spacing: 0.1em;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: var(--accent);
            color: #000;
        }

        /* ── 3D VIEWPORT (sticky = stays visible as page scrolls) ── */
        .viewport {
            position: fixed;
            inset: 0;
            z-index: 1;
            overflow: hidden;
            perspective: 1000px;
        }

        .world {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-style: preserve-3d;
            will-change: transform;
        }

        /* ── SCENE ITEMS ── */
        .item {
            position: absolute;
            left: 0;
            top: 0;
            backface-visibility: hidden;
            transform-origin: center center;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .big-text {
            font-size: 15vw;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.07);
            -webkit-text-stroke: 2px rgba(255, 255, 255, 0.85);
            text-transform: uppercase;
            white-space: nowrap;
            transform: translate(-50%, -50%);
            pointer-events: none;
            letter-spacing: -0.05em;
            user-select: none;
        }

        .card {
            width: 300px;
            height: 440px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            transform: translate(-50%, -50%);
            transition: border-color 0.3s, box-shadow 0.3s;
            position: relative;
        }

        .card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 40px rgba(255, 0, 60, 0.25);
        }

        .card-id {
            font-family: var(--font-code);
            color: var(--accent);
            font-size: 0.75rem;
            letter-spacing: 0.1em;
        }

        .card-title {
            font-size: 2.2rem;
            line-height: 0.95;
            text-transform: uppercase;
            font-weight: 700;
            color: #fff;
        }

        .card-meta {
            font-family: var(--font-code);
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.35);
            display: flex;
            justify-content: space-between;
        }

        .card-num {
            position: absolute;
            bottom: 1.5rem;
            right: 1.5rem;
            font-size: 3.5rem;
            font-weight: 900;
            opacity: 0.06;
            line-height: 1;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255, 255, 255, 0.9);
            transform: translate(-50%, -50%);
            border-radius: 50%;
        }
    </style>
</head>

<body>

    <!-- POST-PROCESSING -->
    <div class="scanlines"></div>
    <div class="vignette"></div>

    <!-- BACK BUTTON -->
    <a href="/home" class="back-btn">&lt; RETURN TO MAIN</a>

    <!-- HUD OVERLAY -->
    <div class="hud">
        <div class="hud-row">
            <span>SYS.READY</span>
            <div class="hud-line"></div>
            <span>FPS&nbsp;<strong id="fps">60</strong></span>
        </div>
        <div class="hud-side">
            SCROLL_VEL // <strong id="vel">0.00</strong>
        </div>
        <div class="hud-row">
            <span>COORD&nbsp;<strong id="coord">0</strong></span>
            <div class="hud-line"></div>
            <span>VER&nbsp;2.0.4&nbsp;[BETA]</span>
        </div>
    </div>

    <!-- 3D SCENE -->
    <div class="viewport" id="viewport">
        <div class="world" id="world"></div>
    </div>

    <script src="https://unpkg.com/@studio-freight/lenis@1.0.33/dist/lenis.min.js"></script>
    <script>
        // ── CONFIG ──────────────────────────────────────────────
        const ITEM_COUNT = 20;
        const STAR_COUNT = 180;
        const Z_GAP = 800;
        const LOOP_SIZE = ITEM_COUNT * Z_GAP;   // total depth of one loop
        const CAM_SPEED = 2.0;                  // px of cameraZ per px scrolled
        const TEXTS = ["WEB", "FORENSICS", "BINARY", "ML", "MISC", "CRYPTO", "REVERSE", "OSINT", "NETWORK", "kernal"];

        // ── STATE ────────────────────────────────────────────────
        let scrollY = 0;
        let velocity = 0;
        let targetVel = 0;
        let mouseX = 0;
        let mouseY = 0;

        const world = document.getElementById('world');
        const viewport = document.getElementById('viewport');
        const elFps = document.getElementById('fps');
        const elVel = document.getElementById('vel');
        const elCoord = document.getElementById('coord');

        // ── BUILD SCENE ──────────────────────────────────────────
        const items = [];

        for (let i = 0; i < ITEM_COUNT; i++) {
            const wrapper = document.createElement('div');
            wrapper.className = 'item';

            if (i % 4 === 0) {
                // Big outline text
                const txt = document.createElement('div');
                txt.className = 'big-text';
                txt.textContent = TEXTS[i % TEXTS.length];
                wrapper.appendChild(txt);
                items.push({
                    el: wrapper, type: 'text',
                    x: 0, y: 0, rot: 0,
                    baseZ: -i * Z_GAP
                });
            } else {
                // Floating card
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="card-id">ID-${Math.floor(Math.random() * 9999).toString().padStart(4, '0')}</div>
                    <div class="card-title">${TEXTS[i % TEXTS.length]}</div>
                    <div class="card-meta">
                        <span>GRID ${Math.floor(Math.random() * 9)}x${Math.floor(Math.random() * 9)}</span>
                        <span>${(Math.random() * 100).toFixed(1)} MB</span>
                    </div>
                    <div class="card-num">0${i}</div>
                `;
                wrapper.appendChild(card);

                const angle = (i / ITEM_COUNT) * Math.PI * 6;
                const x = Math.cos(angle) * (window.innerWidth * 0.28);
                const y = Math.sin(angle) * (window.innerHeight * 0.28);
                const rot = (Math.random() - 0.5) * 28;
                items.push({el: wrapper, type: 'card', x, y, rot, baseZ: -i * Z_GAP});
            }
            world.appendChild(wrapper);
        }

        for (let i = 0; i < STAR_COUNT; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            world.appendChild(s);
            items.push({
                el: s, type: 'star',
                x: (Math.random() - 0.5) * 3000,
                y: (Math.random() - 0.5) * 3000,
                baseZ: -Math.random() * LOOP_SIZE
            });
        }

        // ── LENIS SMOOTH SCROLL ──────────────────────────────────
        const lenis = new Lenis({
            lerp: 0.08,
            smoothWheel: true,
            smoothTouch: false
        });

        lenis.on('scroll', (e) => {
            scrollY = e.scroll;
            targetVel = e.velocity;
        });

        // ── MOUSE PARALLAX ───────────────────────────────────────
        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
            mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
        });

        // ── RENDER LOOP ──────────────────────────────────────────
        let lastTime = 0;
        let frameCount = 0;
        let fpsTime = 0;

        function raf(t) {
            lenis.raf(t);

            // FPS counter
            frameCount++;
            if (t - fpsTime >= 500) {
                elFps.textContent = Math.round(frameCount * 1000 / (t - fpsTime));
                frameCount = 0;
                fpsTime = t;
            }

            // Smooth velocity
            velocity += (targetVel - velocity) * 0.12;

            // HUD
            elVel.textContent = Math.abs(velocity).toFixed(2);
            elCoord.textContent = Math.round(scrollY);

            // Camera tilt from mouse + speed
            const tiltX = mouseY * 4 - velocity * 0.4;
            const tiltY = mouseX * 4;
            world.style.transform = `rotateX(${tiltX}deg) rotateY(${tiltY}deg)`;

            // Dynamic FOV — narrows when fast (warp feel)
            viewport.style.perspective = `${Math.max(400, 1000 - Math.abs(velocity) * 8)}px`;

            // Camera Z (scroll → depth)
            const cameraZ = scrollY * CAM_SPEED;

            items.forEach(item => {
                // Looping depth
                let vizZ = ((item.baseZ + cameraZ) % LOOP_SIZE + LOOP_SIZE) % LOOP_SIZE;
                if (vizZ > 600) vizZ -= LOOP_SIZE;   // wrap behind camera

                // Fade in / fade out
                let alpha = 1;
                if (vizZ < -3000) alpha = 0;
                else if (vizZ < -2000) alpha = (vizZ + 3000) / 1000;
                if (vizZ > 100 && item.type !== 'star') alpha = 1 - (vizZ - 100) / 400;
                if (alpha <= 0) {item.el.style.opacity = 0; return;}

                item.el.style.opacity = alpha;

                // Build transform
                let tr = `translate3d(${item.x}px, ${item.y}px, ${vizZ}px)`;

                if (item.type === 'star') {
                    const stretch = Math.max(1, Math.min(1 + Math.abs(velocity) * 0.15, 12));
                    tr += ` scale3d(1, 1, ${stretch})`;

                } else if (item.type === 'text') {
                    tr += ` rotateZ(${item.rot}deg)`;
                    const txt = item.el.firstChild;
                    if (txt && Math.abs(velocity) > 0.5) {
                        const off = velocity * 2.5;
                        txt.style.textShadow = `${off}px 0 #ff003c, ${-off}px 0 #00f3ff`;
                    } else if (txt) {
                        txt.style.textShadow = 'none';
                    }

                } else {
                    const float = Math.sin(t * 0.0008 + item.x * 0.01) * 8;
                    tr += ` rotateZ(${item.rot}deg) rotateY(${float}deg)`;
                }

                item.el.style.transform = tr;
            });

            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);
    </script>
</body>

</html>
